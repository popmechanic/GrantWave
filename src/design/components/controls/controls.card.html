<!-- @dsCard group="Components" viewport="700x260" name="Controls" subtitle="Segmented toggle, $ stepper input & year slider — the assumption knobs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 40px; align-items: start; max-width: 640px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field > .kmun-eyebrow { color: var(--text-muted); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SegmentedToggle, StepperInput, YearSlider } = window.KMUNDesignSystem_4ae2e2;
  function Demo() {
    const [hours, setHours] = React.useState(32);
    const [salary, setSalary] = React.useState(48200);
    const [year, setYear] = React.useState(2030);
    return (
      <div className="grid">
        <div className="field">
          <span className="kmun-eyebrow">Weekly hours</span>
          <SegmentedToggle ariaLabel="Weekly hours"
            options={[{ value: 32, label: '32 hrs' }, { value: 40, label: '40 hrs' }]}
            value={hours} onChange={setHours} />
        </div>
        <div className="field">
          <span className="kmun-eyebrow">Annual salary</span>
          <StepperInput value={salary} step={500} prefix="$" suffix="/yr" onChange={setSalary} ariaLabel="Annual salary" />
        </div>
        <div className="field" style={{ gridColumn: '1 / -1' }}>
          <YearSlider min={2025} max={2035} value={year} onChange={setYear} label="Project runway through" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
